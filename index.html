<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: #000;
            -webkit-font-smoothing: antialiased;
            -webkit-text-size-adjust: 100%;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .viewer-wrapper {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            width: 100%;
            background: #000;
        }

        .viewer-wrapper::-webkit-scrollbar {
            width: 6px;
        }

        .viewer-wrapper::-webkit-scrollbar-track {
            background: transparent;
        }

        .viewer-wrapper::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 3px;
        }

        .pdf-page {
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            margin: 0;
            padding: 0;
        }

        .pdf-page canvas {
            width: 100vw;
            height: auto;
            display: block;
            background: white;
        }

        .loading {
            display: flex;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        .loading.hidden {
            display: none;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading p {
            color: white;
            font-size: 16px;
            font-weight: 500;
        }

        .error {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            background: linear-gradient(135deg, #ff3333 0%, #cc0000 100%);
            color: white;
            padding: 16px 20px;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(255, 51, 51, 0.3);
            z-index: 300;
            font-weight: 500;
        }

        .error.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>Đang tải PDF...</p>
        </div>
        <div class="error" id="error"></div>
        <div class="viewer-wrapper" id="viewer">
            <!-- Tất cả các trang sẽ được render ở đây -->
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pdfDoc = null;
        const viewer = document.getElementById('viewer');
        const loading = document.getElementById('loading');
        const errorEl = document.getElementById('error');

        async function loadAndRenderPDF() {
            try {
                const params = new URLSearchParams(window.location.search);
                const pdfFile = params.get('file') || 'starry.pdf';
                
                const response = await fetch(pdfFile);
                if (!response.ok) {
                    throw new Error('Không thể tải file PDF: ' + pdfFile);
                }
                const data = await response.arrayBuffer();
                pdfDoc = await pdfjsLib.getDocument(data).promise;
                
                // Pre-render tất cả trang
                await renderAllPagesStatic();
                
                loading.classList.add('hidden');
            } catch (error) {
                loading.classList.add('hidden');
                showError('Lỗi: ' + error.message);
            }
        }

        async function renderAllPagesStatic() {
            viewer.innerHTML = '';
            
            for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum++) {
                try {
                    const page = await pdfDoc.getPage(pageNum);
                    
                    // Render với scale = 1 viewport width
                    const viewport = page.getViewport({ scale: window.innerWidth / page.getViewport({ scale: 1 }).width });
                    
                    const canvas = document.createElement('canvas');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    
                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'pdf-page';
                    pageDiv.appendChild(canvas);
                    viewer.appendChild(pageDiv);
                    
                    const renderContext = {
                        canvasContext: canvas.getContext('2d'),
                        viewport: viewport
                    };
                    
                    await page.render(renderContext).promise;
                } catch (error) {
                    console.error(`Error rendering page ${pageNum}:`, error);
                }
            }
        }

        function showError(message) {
            errorEl.textContent = message;
            errorEl.classList.add('active');
        }

        // Start loading
        window.addEventListener('load', loadAndRenderPDF);
    </script>
</body>
</html>
