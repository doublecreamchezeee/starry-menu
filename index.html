<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -webkit-text-size-adjust: 100%;
        }

        .container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
        }

        .viewer-wrapper {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            gap: 30px;
            scroll-behavior: smooth;
        }

        .viewer-wrapper::-webkit-scrollbar {
            width: 10px;
        }

        .viewer-wrapper::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
        }

        .viewer-wrapper::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.4);
            border-radius: 5px;
        }

        .viewer-wrapper::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.6);
        }

        .pdf-page {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: center;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .pdf-page canvas {
            width: 100% !important;
            height: auto !important;
            background-color: white;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            display: block;
            image-rendering: crisp-edges;
        }

        /* Navigation Controls */
        .controls {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 16px 28px;
            border-radius: 50px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .page-info {
            font-size: 14px;
            font-weight: 500;
            color: #333;
            min-width: 80px;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .page-info span:first-child {
            font-weight: 700;
            color: #0066ff;
            font-size: 16px;
        }

        button {
            background: linear-gradient(135deg, #0066ff 0%, #0052cc 100%);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 24px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 12px rgba(0, 102, 255, 0.3);
            letter-spacing: 0.3px;
            -webkit-tap-highlight-color: transparent;
        }

        button:hover:not(:disabled) {
            background: linear-gradient(135deg, #0052cc 0%, #003d99 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 102, 255, 0.4);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            background: linear-gradient(135deg, #ccc 0%, #aaa 100%);
            cursor: not-allowed;
            box-shadow: none;
            opacity: 0.5;
        }

        .loading {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 200;
        }

        .loading.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading p {
            color: white;
            font-size: 16px;
            font-weight: 500;
        }

        .error {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            background: linear-gradient(135deg, #ff3333 0%, #cc0000 100%);
            color: white;
            padding: 16px 20px;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(255, 51, 51, 0.3);
            z-index: 300;
            font-weight: 500;
        }

        .error.active {
            display: block;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .loading-indicator {
            display: none;
            text-align: center;
            padding: 30px 20px;
            color: #aaa;
        }

        .loading-indicator.active {
            display: block;
        }

        @media (max-width: 768px) {
            .controls {
                bottom: 20px;
                gap: 12px;
                padding: 12px 16px;
            }

            button {
                padding: 8px 14px;
                font-size: 12px;
            }

            .page-info {
                font-size: 13px;
                min-width: 70px;
            }

            .viewer-wrapper {
                padding: 15px;
                gap: 20px;
            }

            .pdf-page canvas {
                border-radius: 8px;
            }
        }

        @media (max-width: 480px) {
            .viewer-wrapper {
                padding: 10px;
                gap: 15px;
                padding-bottom: 100px;
            }

            .controls {
                bottom: 12px;
                left: 12px;
                right: 12px;
                transform: none;
                gap: 8px;
                padding: 10px 12px;
            }

            button {
                padding: 6px 12px;
                font-size: 11px;
                flex: 1;
            }

            .page-info {
                font-size: 12px;
                min-width: 60px;
            }

            .pdf-page {
                max-width: 100%;
            }

            .pdf-page canvas {
                border-radius: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error" id="error"></div>
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>Đang tải PDF...</p>
        </div>
        <div class="viewer-wrapper" id="viewer">
            <!-- Tất cả các trang sẽ được render ở đây -->
        </div>
        <div class="controls">
            <button id="prevBtn" onclick="prevPage()">← Trước</button>
            <span class="page-info">
                <span id="currentPage">1</span> / <span id="totalPages">0</span>
            </span>
            <button id="nextBtn" onclick="nextPage()">Sau →</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // Set up PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pdfDoc = null;
        let currentPage = 1;
        const viewer = document.getElementById('viewer');
        const canvases = [];

        async function loadPDF() {
            try {
                document.getElementById('loading').classList.add('active');
                const params = new URLSearchParams(window.location.search);
                const pdfFile = params.get('file') || 'starry.pdf';
                
                const response = await fetch(pdfFile);
                if (!response.ok) {
                    throw new Error('Không thể tải file PDF: ' + pdfFile);
                }
                const data = await response.arrayBuffer();
                pdfDoc = await pdfjsLib.getDocument(data).promise;
                document.getElementById('totalPages').textContent = pdfDoc.numPages;
                
                // Render tất cả các trang
                await renderAllPages();
                
                document.getElementById('loading').classList.remove('active');
                updatePageIndicator();
            } catch (error) {
                document.getElementById('loading').classList.remove('active');
                showError('Lỗi: ' + error.message);
            }
        }

        async function renderAllPages() {
            viewer.innerHTML = '';
            canvases.length = 0;

            for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum++) {
                const page = await pdfDoc.getPage(pageNum);
                
                // Tạo div wrapper
                const pageDiv = document.createElement('div');
                pageDiv.className = 'pdf-page';
                pageDiv.id = `page-${pageNum}`;
                
                // Tạo canvas
                const canvas = document.createElement('canvas');
                canvas.id = `canvas-${pageNum}`;
                
                // Tính toán scale
                const maxWidth = Math.min(800, window.innerWidth - 40);
                const viewport = page.getViewport({ scale: 1 });
                const scale = maxWidth / viewport.width;
                const scaledViewport = page.getViewport({ scale: Math.min(scale, 2) });

                canvas.width = scaledViewport.width;
                canvas.height = scaledViewport.height;

                const renderContext = {
                    canvasContext: canvas.getContext('2d'),
                    viewport: scaledViewport
                };

                pageDiv.appendChild(canvas);
                viewer.appendChild(pageDiv);
                canvases.push(canvas);

                // Render trang
                await page.render(renderContext).promise;
            }
        }

        function getCurrentPageFromScroll() {
            const viewerRect = viewer.getBoundingClientRect();
            let closestPage = 1;
            let closestDistance = Infinity;

            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const pageDiv = document.getElementById(`page-${i}`);
                if (pageDiv) {
                    const pageRect = pageDiv.getBoundingClientRect();
                    const distance = Math.abs(pageRect.top - viewerRect.top - 100);
                    
                    if (distance < closestDistance) {
                        closestDistance = distance;
                        closestPage = i;
                    }
                }
            }

            return closestPage;
        }

        function nextPage() {
            const nextPageNum = currentPage + 1;
            if (nextPageNum <= pdfDoc.numPages) {
                scrollToPage(nextPageNum);
            }
        }

        function prevPage() {
            const prevPageNum = currentPage - 1;
            if (prevPageNum >= 1) {
                scrollToPage(prevPageNum);
            }
        }

        function scrollToPage(pageNum) {
            const pageDiv = document.getElementById(`page-${pageNum}`);
            if (pageDiv) {
                pageDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
                currentPage = pageNum;
                updatePageIndicator();
            }
        }

        function updatePageIndicator() {
            const newPage = getCurrentPageFromScroll();
            if (newPage !== currentPage) {
                currentPage = newPage;
            }
            
            document.getElementById('currentPage').textContent = currentPage;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === pdfDoc.numPages;
        }

        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = message;
            errorEl.classList.add('active');
        }

        // Update page indicator on scroll
        viewer.addEventListener('scroll', () => {
            updatePageIndicator();
        });

        // Handle window resize
        window.addEventListener('resize', async () => {
            if (pdfDoc) {
                await renderAllPages();
            }
        });

        // Load PDF on page load
        window.addEventListener('load', loadPDF);
    </script>
</body>
</html>
