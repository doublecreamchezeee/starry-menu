<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        .viewer-wrapper {
            flex: 1;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        .viewer-wrapper::-webkit-scrollbar {
            width: 8px;
        }

        .viewer-wrapper::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
        }

        .viewer-wrapper::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
        }

        .viewer-wrapper::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.5);
        }

        #pdfCanvas {
            max-width: 100%;
            height: auto;
            background-color: white;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            border-radius: 12px;
        }

        /* Navigation Controls */
        .controls {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 16px 28px;
            border-radius: 50px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .page-info {
            font-size: 14px;
            font-weight: 500;
            color: #333;
            min-width: 80px;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .page-info span:first-child {
            font-weight: 700;
            color: #0066ff;
            font-size: 16px;
        }

        button {
            background: linear-gradient(135deg, #0066ff 0%, #0052cc 100%);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 24px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 12px rgba(0, 102, 255, 0.3);
            letter-spacing: 0.3px;
        }

        button:hover:not(:disabled) {
            background: linear-gradient(135deg, #0052cc 0%, #003d99 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 102, 255, 0.4);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            background: linear-gradient(135deg, #ccc 0%, #aaa 100%);
            cursor: not-allowed;
            box-shadow: none;
            opacity: 0.5;
        }

        .loading {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 200;
        }

        .loading.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading p {
            color: white;
            font-size: 16px;
            font-weight: 500;
        }

        .error {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            background: linear-gradient(135deg, #ff3333 0%, #cc0000 100%);
            color: white;
            padding: 16px 20px;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(255, 51, 51, 0.3);
            z-index: 300;
            font-weight: 500;
        }

        .error.active {
            display: block;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .controls {
                bottom: 20px;
                gap: 12px;
                padding: 12px 16px;
            }

            button {
                padding: 8px 14px;
                font-size: 12px;
            }

            .page-info {
                font-size: 13px;
                min-width: 70px;
            }

            #pdfCanvas {
                border-radius: 8px;
            }
        }

        @media (max-width: 480px) {
            .viewer-wrapper {
                padding: 10px;
            }

            .controls {
                bottom: 12px;
                left: 12px;
                right: 12px;
                transform: none;
                gap: 8px;
                padding: 10px 12px;
            }

            button {
                padding: 6px 12px;
                font-size: 11px;
                flex: 1;
            }

            .page-info {
                font-size: 12px;
                min-width: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error" id="error"></div>
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>Đang tải PDF...</p>
        </div>
        <div class="viewer-wrapper">
            <canvas id="pdfCanvas"></canvas>
        </div>
        <div class="controls">
            <button id="prevBtn" onclick="prevPage()">← Trước</button>
            <span class="page-info">
                <span id="currentPage">1</span> / <span id="totalPages">0</span>
            </span>
            <button id="nextBtn" onclick="nextPage()">Sau →</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // Set up PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pdfDoc = null;
        let currentPage = 1;
        const canvas = document.getElementById('pdfCanvas');
        const ctx = canvas.getContext('2d');

        async function loadPDF() {
            try {
                document.getElementById('loading').classList.add('active');
                // Lấy tên file PDF từ query string hoặc dùng mặc định
                const params = new URLSearchParams(window.location.search);
                const pdfFile = params.get('file') || 'starry.pdf';
                
                const response = await fetch(pdfFile);
                if (!response.ok) {
                    throw new Error('Không thể tải file PDF: ' + pdfFile);
                }
                const data = await response.arrayBuffer();
                pdfDoc = await pdfjsLib.getDocument(data).promise;
                document.getElementById('totalPages').textContent = pdfDoc.numPages;
                document.getElementById('loading').classList.remove('active');
                renderPage(currentPage);
            } catch (error) {
                document.getElementById('loading').classList.remove('active');
                showError('Lỗi: ' + error.message);
            }
        }

        async function renderPage(pageNum) {
            try {
                if (pageNum < 1 || pageNum > pdfDoc.numPages) return;
                
                document.getElementById('loading').classList.add('active');
                const page = await pdfDoc.getPage(pageNum);
                
                // Calculate scale based on viewport
                const containerWidth = document.querySelector('.viewer-wrapper').clientWidth - 20;
                const viewport = page.getViewport({ scale: 1 });
                const scale = containerWidth / viewport.width;
                const scaledViewport = page.getViewport({ scale: scale > 2 ? 2 : scale });

                canvas.width = scaledViewport.width;
                canvas.height = scaledViewport.height;

                const renderContext = {
                    canvasContext: ctx,
                    viewport: scaledViewport
                };

                await page.render(renderContext).promise;
                currentPage = pageNum;
                document.getElementById('currentPage').textContent = currentPage;
                updateButtons();
                document.getElementById('loading').classList.remove('active');
            } catch (error) {
                showError('Lỗi khi render trang: ' + error.message);
                document.getElementById('loading').classList.remove('active');
            }
        }

        function nextPage() {
            if (currentPage < pdfDoc.numPages) {
                renderPage(currentPage + 1);
            }
        }

        function prevPage() {
            if (currentPage > 1) {
                renderPage(currentPage - 1);
            }
        }

        function updateButtons() {
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === pdfDoc.numPages;
        }

        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = message;
            errorEl.classList.add('active');
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            if (pdfDoc) {
                renderPage(currentPage);
            }
        });

        // Load PDF on page load
        window.addEventListener('load', loadPDF);
    </script>
</body>
</html>
